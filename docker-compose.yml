services:
  migrate:
    build:
      context: .
      target: builder
    command: npm run db:push
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgres://zatca:zatca@db:5432/zatca
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env.example
    environment:
      # These override whatever is in .env.example for Docker networking
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://zatca:zatca@db:5432/zatca
      RAGFLOW_BASE_URL: http://host.docker.internal:8000
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zatca
      POSTGRES_PASSWORD: zatca
      POSTGRES_DB: zatca
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zatca -d zatca"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
